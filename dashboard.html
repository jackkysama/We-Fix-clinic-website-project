<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - We Fix Clinic</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: url('images/4.jpeg') no-repeat center/cover;
      height: 100vh;
      color: white;
    }

    /* Overlay */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      top: 0;
      left: 0;
      z-index: 0;
    }

    .navbar {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
      background: rgba(0,0,0,0.4);
    }

    .navbar a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 40px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* CARDS */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 200px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .card h2 {
      margin: 10px 0;
    }

    /* ACTION BUTTONS */
    .actions {
      margin-top: 20px;
    }

    .actions button {
      padding: 10px 15px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
      background: #2c5364;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .actions button:hover {
      background: #1a3c4a;
    }

  </style>
</head>

<body>

  <div class="navbar">
    <div><b>We Fix Clinic</b></div>
    <div>
      <a href="index.html">Home</a>
      <a href="booking.html">Book</a>
      <a href="view-bookings.html">Appointments</a>
      <a href="login.html">Logout</a>
    </div>
  </div>

  <div class="container">
    <h1>Welcome to Dashboard</h1>

    <!-- STATS -->
    <div class="cards">
      <div class="card">
        <h3>Total Appointments</h3>
        <h2 id="totalAppointments">0</h2>
      </div>

      <div class="card">
        <h3>Doctors Available</h3>
        <h2>4</h2>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button onclick="goBooking()">Book Appointment</button>
      <button onclick="viewBookings()">View My Appointments</button>
    </div>

  </div>

<script>
const role = localStorage.getItem("role");

if (role !== "patient") {
  window.location.href = "login.html";
}
</script>
<script>

function goBooking() {
  window.location.href = "booking.html";
}

function viewBookings() {
  window.location.href = "view-bookings.html";
}

/* OPTIONAL: fetch real count */
fetch('/appointments')
  .then(res => res.json())
  .then(data => {
    document.getElementById("totalAppointments").innerText = data.length || 0;
  })
  .catch(() => {
    document.getElementById("totalAppointments").innerText = "0";
  });

</script>

</body>
</html>

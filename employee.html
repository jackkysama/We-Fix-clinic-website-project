<!DOCTYPE html>
<html>
<head>
<title>Employee Panel - We Fix Clinic</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  margin: 0;
}

.nav {
  background: #0f172a;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

input, select {
  padding: 5px;
  margin: 5px;
}

button {
  padding: 5px 10px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="nav">
  <div>👨‍⚕️ Employee Panel</div>
  <div>
    <a href="index.html" style="color:white;">Home</a>
  </div>
</div>

<div class="container">
  <h2>All Bookings</h2>
  <div id="data"></div>
</div>

<script>

const role = localStorage.getItem("role");

// 🔒 Redirect if not logged in
if (!role) {
  window.location.href = "login.html";
}

// 🚀 LOAD BOOKINGS
function loadBookings() {

  fetch('/appointments')
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById("data");
      container.innerHTML = "";

      data.forEach(b => {

        container.innerHTML += `
          <div class="card">

            <p><b>ID:</b> ${b.id}</p>

            <p><b>Name:</b> 
              <input id="name-${b.id}" value="${b.name}">
            </p>

            <p><b>Doctor:</b> 
              <input id="doctor-${b.id}" value="${b.doctor}">
            </p>

            <p><b>Date:</b> 
              <input type="date" id="date-${b.id}" value="${b.date}">
            </p>

            <p><b>Time:</b> 
              <input type="time" id="time-${b.id}" value="${b.time}">
            </p>

            <p><b>Status:</b> ${b.status}</p>

            <button onclick="update(${b.id})">Edit</button>
            <button onclick="setStatus(${b.id}, 'Confirmed')">✔ Confirm</button>
            <button onclick="setStatus(${b.id}, 'Cancelled')">✖ Cancel</button>

          </div>
        `;
      });

    });
}

// ✏️ UPDATE
function update(id) {

  const name = document.getElementById(`name-${id}`).value;
  const doctor = document.getElementById(`doctor-${id}`).value;
  const date = document.getElementById(`date-${id}`).value;
  const time = document.getElementById(`time-${id}`).value;

  fetch('/update/' + id, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'role': localStorage.getItem("role") // 🔒 important
    },
    body: JSON.stringify({ name, doctor, date, time })
  })
  .then(() => {
    alert("Updated!");
    loadBookings();
  });
}

// 🔄 STATUS UPDATE
function setStatus(id, status) {

  fetch('/status/' + id, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'role': localStorage.getItem("role") // 🔒 important
    },
    body: JSON.stringify({ status })
  })
  .then(() => loadBookings());
}

// 🚀 INIT
loadBookings();

</script>
</body>
</html>

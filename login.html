<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - We Fix Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>We Fix Clinic</h1>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#doctors-section">Doctors</a></li>
                <li><a href="booking.html">Book Appointment</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="login-section">
        <div class="login-container">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label for="role">Role:</label>
                    <select id="role" required>
                        <option value="">Select Role</option>
                        <option value="admin">Admin</option>
                        <option value="employee">Employee</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-large">Login</button>
            </form>
            <div id="message"></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2023 We Fix Clinic. All rights reserved.</p>
        <p>Contact: info@wefixclinic.com | Phone: (123) 456-7890</p>
    </footer>

    <!-- Boka AI Chatbot Button -->
    <button id="chatbot-button">💬</button>
    <script src="js/api.js?v=3"></script>
    <script src="js/script.js?v=4"></script>
</body>
</html>

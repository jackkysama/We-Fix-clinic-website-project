<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - We Fix Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>We Fix Clinic</h1>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#doctors-section">Doctors</a></li>
                <li><a href="booking.html">Book Appointment</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="booking-section">
        <div class="booking-container">
            <h2>Book an Appointment</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required placeholder="your.email@example.com">
                </div>
                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" required placeholder="+1 (123) 456-7890">
                </div>
                <div class="form-group">
                    <label for="doctor">Select Doctor:</label>
                    <select id="doctor" required>
                        <option value="">Choose a Doctor</option>
                    </select>
                    <p id="availabilityMessage" style="margin-top: 10px; color: #555; font-size: 0.95rem;"></p>
                </div>
                <div class="form-group">
                    <label for="date">Preferred Date:</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="time">Preferred Time:</label>
                    <select id="time" required>
                        <option value="">Select Time</option>
                        <option value="9:00 AM">9:00 AM</option>
                        <option value="10:00 AM">10:00 AM</option>
                        <option value="11:00 AM">11:00 AM</option>
                        <option value="2:00 PM">2:00 PM</option>
                        <option value="3:00 PM">3:00 PM</option>
                        <option value="4:00 PM">4:00 PM</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reason">Reason for Visit:</label>
                    <textarea id="reason" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-large">Book Appointment</button>
            </form>
            <div id="bookingMessage"></div>
            <div id="bookingConfirmationCard" class="booking-confirmation-card" style="display: none;"></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2023 We Fix Clinic. All rights reserved.</p>
        <p>Contact: info@wefixclinic.com | Phone: (123) 456-7890</p>
    </footer>

    <!-- Boka AI Chatbot Button -->
    <button id="chatbot-button">💬</button>
    <script src="js/api.js?v=3"></script>
    <script src="js/script.js?v=4"></script>
</body>
</html>

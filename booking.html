<!DOCTYPE html>
<html>
<head>
  <title>Book Appointment - We Fix Clinic</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;

      background: url('images/3.jpeg') no-repeat center/cover;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* DARK OVERLAY */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
    }

    .container {
      position: relative;
      z-index: 1;

      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);

      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;

      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      color: white;
    }

    h2 {
      margin-bottom: 20px;
    }

    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 15px;
      border: none;
      border-radius: 5px;
      background: #2c5364;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1a3c4a;
    }

    .top-bar {
      position: absolute;
      top: 20px;
      right: 30px;
      z-index: 2;
    }

    .top-bar a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="top-bar">
  <a href="dashboard.html">Dashboard</a>
  <a href="index.html">Home</a>
</div>

<div class="container">
  <h2>Book Appointment</h2>

  <input type="text" id="name" placeholder="Your Name">

  <select id="doctor">
    <option>Dr. Ghiraula</option>
    <option>Dr. Buniya</option>
    <option>Dr. Kumar</option>
    <option>Dr. Amrit</option>
  </select>

  <input type="date" id="date">
  <input type="time" id="time">

  <button onclick="book()">Book Now</button>
</div>

<script>

function book() {
  const name = document.getElementById("name").value;
  const doctor = document.getElementById("doctor").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  fetch('/book', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ name, doctor, date, time })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert("Appointment booked!");
      window.location.href = "view-bookings.html";
    } else {
      alert("Booking failed");
    }
  });
}

</script>

</body>
</html>
